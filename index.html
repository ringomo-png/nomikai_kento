<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table | Modern Sans-Serif</title>
    <style>
        :root {
            --bg: #ffffff;         
            --text-active: #555555; 
            --text-muted: #999999;  
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            /* --- 修正ポイント1：アプリ全体のフォントをモダンなサンセリフ体に統一 --- */
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            cursor: grab; 
            overscroll-behavior-y: none;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        body:active { cursor: grabbing; }

        #interactive-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transform: translateY(0px);
            will-change: transform;
        }

        /* --- 修正ポイント2：ロゴを「Table」に変更し、スタイルを調整 --- */
        #top-logo {
            position: fixed;
            top: 50px; 
            left: 25px; 
            height: 32px; 
            line-height: 32px; 
            font-size: 17px; /* 少しだけ大きくして存在感を出す */
            font-weight: 700; 
            letter-spacing: 0.02em; /* サンセリフの太字に合う、引き締まった字間 */
            color: #222222; 
            opacity: 0;
            z-index: 30;
            pointer-events: none;
        }

        #profile-icon {
            position: fixed;
            top: 50px; 
            right: 25px; 
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.2px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 500; /* Mの文字を少しだけしっかりさせる */
            color: var(--text-muted); 
            z-index: 40;
            cursor: pointer;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s ease, transform 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        #profile-icon:hover {
            opacity: 0.8;
            color: var(--text-active);
            border-color: var(--text-active);
            transform: scale(0.9);
            background-color: rgba(0,0,0,0.01);
        }

        @keyframes concurrentReveal {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.95); letter-spacing: -2px; }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); letter-spacing: 0.08em; } /* サンセリフ用の字間に調整 */
        }

        @keyframes logoReveal {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.95); letter-spacing: -2px; }
            100% { opacity: 1; filter: blur(0px); transform: scale(1); letter-spacing: 0.02em; }
        }

        .reveal { 
            animation: concurrentReveal 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; 
            pointer-events: auto !important;
        }
        
        .reveal-skip {
            animation: none !important;
            opacity: 1 !important; filter: blur(0px) !important;
            transform: scale(1) !important; letter-spacing: 0.08em !important;
            pointer-events: auto !important;
        }

        #top-logo.reveal { animation: logoReveal 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; pointer-events: none !important; }
        #top-logo.reveal-skip { letter-spacing: 0.02em !important; }

        #countdown-screen {
            padding: 20px;
            font-size: 15px; /* カウントダウンを少し大きく */
            font-weight: 300; /* 細字にしてモダンに */
            letter-spacing: 0.1em;
            color: var(--text-active);
            font-variant-numeric: tabular-nums; /* サンセリフでも数字の幅がブレない魔法の設定 */
            transition: opacity 1s ease-out;
            position: absolute;
            z-index: 20;
            pointer-events: auto; 
        }

        #countdown-screen:hover { opacity: 0.5; }

        #detail-screen {
            display: none; 
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        #detail-screen.active { display: flex; }

        .info-text {
            font-size: 13px;
            font-weight: 500; /* 日付や場所を少しクッキリと */
            letter-spacing: 0.08em;
            color: var(--text-active);
            margin: 0;
            text-align: center;
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.95);
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .blink-colon {
            animation: blink 1s infinite;
            display: inline-block; 
            position: relative;
            top: -1px; /* サンセリフのコロンの縦位置を微調整 */
        }

        @keyframes waterRipple {
            0%   { transform: translate(0, 0) scale(1) skewX(0deg); filter: blur(0px); }
            20%  { transform: translate(-3px, 2px) scale(0.99) skewX(-1.5deg); filter: blur(1.5px); }
            40%  { transform: translate(2px, -1px) scale(1.01) skewX(1deg); filter: blur(0.5px); }
            60%  { transform: translate(-1px, 1px) scale(0.995) skewX(-0.5deg); filter: blur(0px); }
            80%  { transform: translate(1px, 0) scale(1) skewX(0deg); filter: blur(0px); }
            100% { transform: translate(0, 0) scale(1) skewX(0deg); filter: blur(0px); }
        }

        .shake-active {
            animation: waterRipple 1.0s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px; 
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.95);
            margin-top: 8px; /* ボタンの上の余白を少し追加 */
        }

        .icon-btn {
            background: transparent; border: none; cursor: pointer;
            color: var(--text-active); padding: 8px; display: inline-flex;
            transition: opacity 0.3s ease, transform 0.2s ease;
            pointer-events: auto;
        }
        .icon-btn:hover { opacity: 0.5; transform: scale(0.9); }
        
        .icon-btn svg {
            width: 18px; height: 18px; 
            fill: currentColor; 
        }

        .bottom-nav {
            position: fixed; 
            bottom: 0; 
            left: 0;            
            width: 100%;        
            padding: 20px 0 40px 0; 
            display: flex;
            justify-content: center; 
            align-items: center;
            gap: 25vw;          
            opacity: 0; 
            z-index: 30; 
            pointer-events: none; 
        }
        
        .bottom-nav.reveal {
            animation: concurrentReveal 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: auto;
        }
        
        .nav-item { 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: color 0.3s ease; 
            position: relative;
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px; 
            pointer-events: auto;
        }

        .nav-item svg {
            width: 22px; height: 22px;
            fill: none; stroke: currentColor; stroke-width: 1.2;
            stroke-linecap: round; stroke-linejoin: round;
        }

        .nav-text {
            font-size: 10px; 
            font-weight: 600; /* ナビテキストは少し太くして読みやすく */
            letter-spacing: 0.15em;
        }

        .nav-item::after {
            content: ''; position: absolute; bottom: 0px; left: 50%;
            width: 60%; height: 1.5px; /* 線を少しだけ太く */
            background-color: var(--text-active);
            transform: translateX(-50%) scaleX(0); 
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        .nav-item:hover { color: var(--text-active); }
        .nav-item:hover::after { transform: translateX(-50%) scaleX(1); }

        /* 参加者リストとホストアイコン */
        #participants-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.96); 
            backdrop-filter: blur(10px); 
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 48px;
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.5s ease;
            cursor: pointer; 
        }

        #participants-modal.active {
            opacity: 1; 
            pointer-events: auto;
        }

        .modal-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.25em; 
            color: var(--text-muted);
        }

        .modal-list {
            display: flex;
            flex-direction: column;
            gap: 24px; 
            align-items: center;
        }

        .member-item {
            font-size: 14px; 
            font-weight: 500; /* 漢字が綺麗に見えるウェイト */
            letter-spacing: 0.1em; 
            color: var(--text-active);
            position: relative; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .host-icon {
            position: absolute;
            left: calc(100% + 10px); 
            width: 13px;
            height: 13px;
            fill: none;
            stroke: var(--text-muted); 
            stroke-width: 1.5; /* サンセリフに合わせて少し線を強めに */
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .modal-close {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-muted);
            margin-top: 20px;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        .modal-close:hover { color: var(--text-active); transform: scale(0.9); }

    </style>
</head>
<body>

    <div id="top-logo">Table</div>

    <div id="profile-icon">M</div>

    <div id="interactive-wrapper">
        <div id="countdown-screen" onclick="showDetails(event)">
            - 00:00:00
        </div>

        <div id="detail-screen">
            <div class="info-text reveal">2026.03.30 MON</div>
            <div class="info-text reveal">19<span class="blink-colon">:</span>00 START</div>
            <div class="info-text reveal">SHINJUKU TORIKIZOKU</div>
            
            <div class="action-buttons reveal">
                <button class="icon-btn" onclick="window.open('https://maps.google.com')" title="Map">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </button>
                <button class="icon-btn" onclick="showParticipants(event)" title="Guest List">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="nav-text">PAST</span>
        </div>
        
        <div class="nav-item">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <line x1="12" y1="14" x2="12" y2="18"></line>
                <line x1="10" y1="16" x2="14" y2="16"></line>
            </svg>
            <span class="nav-text">PLAN</span>
        </div>
    </div>

    <div id="participants-modal" onclick="hideParticipants(event)">
        <div class="modal-title">GUEST</div>
        
        <div class="modal-list">
            <div class="member-item">
                森 賢志
                <svg class="host-icon" viewBox="0 0 24 24">
                    <path d="M12 2l3 6 6 1-4.5 4.5 1 6-5.5-3-5.5 3 1-6L3 9l6-1z"></path>
                </svg>
            </div>
            <div class="member-item">佐藤</div>
            <div class="member-item">ゆき</div>
            <div class="member-item">Daiki.T</div>
        </div>

        <div class="modal-close">✕</div>
    </div>

    <script>
        const targetDate = new Date();
        targetDate.setHours(targetDate.getHours() + 3);

        const countdownEl = document.getElementById('countdown-screen');
        const detailEl = document.getElementById('detail-screen');
        const bottomNavEl = document.getElementById('bottomNav');
        const topLogoEl = document.getElementById('top-logo'); 
        const profileIconEl = document.getElementById('profile-icon'); 
        const modalEl = document.getElementById('participants-modal');
        const revealElements = document.querySelectorAll('#detail-screen .info-text, .action-buttons, #profile-icon'); 

        let isRevealed = false; 

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            if (diff > 0) {
                const h = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
                const m = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
                const s = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
                countdownEl.innerText = `- ${h}:${m}:${s}`;
            } else {
                countdownEl.innerText = "00:00:00";
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function showDetails(e) {
            e.stopPropagation(); 
            countdownEl.style.opacity = '0';
            setTimeout(() => {
                countdownEl.style.display = 'none';
                detailEl.classList.add('active'); 
                bottomNavEl.classList.add('reveal'); 
                topLogoEl.classList.add('reveal'); 
                profileIconEl.classList.add('reveal'); 
            }, 800);
        }

        function showParticipants(e) {
            e.stopPropagation(); 
            modalEl.classList.add('active');
        }

        function hideParticipants(e) {
            e.stopPropagation();
            modalEl.classList.remove('active');
        }

        const infoTextElements = document.querySelectorAll('#detail-screen .info-text');

        const isButtonTap = (e) => {
            return e.target.closest('.icon-btn, .nav-item, #profile-icon, #participants-modal');
        };

        document.body.addEventListener('click', (e) => {
            if (countdownEl.style.display !== 'none') return;
            if (isButtonTap(e)) return;

            if (!isRevealed) {
                revealElements.forEach(el => el.classList.add('reveal-skip'));
                bottomNavEl.classList.add('reveal-skip');
                topLogoEl.classList.add('reveal-skip'); 
                profileIconEl.classList.add('reveal-skip');
                isRevealed = true; 
                return; 
            }

            if (isRevealed) {
                infoTextElements.forEach((el, index) => {
                    el.classList.remove('shake-active');
                    setTimeout(() => {
                        void el.offsetWidth; 
                        el.classList.add('shake-active');
                        el.addEventListener('animationend', () => {
                            el.classList.remove('shake-active');
                        }, { once: true });
                    }, index * 50); 
                });
            }
        });

        const wrapper = document.getElementById('interactive-wrapper');
        let isDragging = false;
        let startY = 0;
        let currentTranslateY = 0;

        const startDrag = (y) => {
            if(modalEl.classList.contains('active')) return; 

            isDragging = true;
            startY = y - currentTranslateY;
            wrapper.style.transition = 'none'; 
        };

        const onDrag = (y) => {
            if (!isDragging) return;
            let moveY = y - startY;
            currentTranslateY = moveY * 0.3; 
            wrapper.style.transform = `translateY(${currentTranslateY}px)`;
        };

        const endDrag = () => {
            if (!isDragging) return;
            isDragging = false;
            wrapper.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
            wrapper.style.transform = `translateY(0px)`;
            currentTranslateY = 0;
        };

        window.addEventListener('mousedown', (e) => startDrag(e.clientY));
        window.addEventListener('mousemove', (e) => onDrag(e.clientY));
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('mouseleave', endDrag);

        window.addEventListener('touchstart', (e) => {
            if(!modalEl.classList.contains('active')) startDrag(e.touches[0].clientY);
        }, { passive: false });
        
        window.addEventListener('touchmove', (e) => {
            if(isDragging) {
                onDrag(e.touches[0].clientY);
                e.preventDefault(); 
            }
        }, { passive: false });
        
        window.addEventListener('touchend', endDrag);

    </script>
</body>
</html>
